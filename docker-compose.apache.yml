# GalleryPack — Production stack with Apache + Let's Encrypt
#
# Usage:
#   cp .env.apache.example .env.apache && nano .env.apache
#   docker compose -f docker-compose.apache.yml --env-file .env.apache up -d
#   bash scripts/init-letsencrypt.sh   # first-time cert only
#
# After first-time cert, restart Apache so it picks up the real cert:
#   docker compose -f docker-compose.apache.yml --env-file .env.apache restart apache

name: gallerypack-apache

services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"
      MYSQL_DATABASE:      "${DB_NAME:-gallerypack}"
      MYSQL_USER:          "${DB_USER:-gallerypack}"
      MYSQL_PASSWORD:      "${DB_PASS:?DB_PASS is required}"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    # Not exposed to the host — Apache proxies to it
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - src_data:/app/src
      - galleries_dist:/app/dist
      - app_data:/app/data
    environment:
      PORT:                "4000"
      NODE_ENV:            "production"
      LICENSE_FILE:        "/app/data/gallerypack.license"
      PLATFORM_MODE:       "${PLATFORM_MODE:-single}"
      BASE_DOMAIN:         "${DOMAIN:?DOMAIN is required}"
      DB_HOST:             "db"
      DB_PORT:             "3306"
      DB_NAME:             "${DB_NAME:-gallerypack}"
      DB_USER:             "${DB_USER:-gallerypack}"
      DB_PASS:             "${DB_PASS:?DB_PASS is required}"
      ADMIN_EMAIL:         "${ADMIN_EMAIL:?ADMIN_EMAIL is required}"
      ADMIN_PASSWORD:      "${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"
      SESSION_SECRET:      "${SESSION_SECRET:?SESSION_SECRET is required}"
      VIEWER_TOKEN_SECRET: "${VIEWER_TOKEN_SECRET:-change-me-in-production}"
      BASE_URL:            "https://${DOMAIN}"
      EMAIL_PROVIDER:      "${EMAIL_PROVIDER:-null}"
      SMTP_HOST:           "${SMTP_HOST:-}"
      SMTP_PORT:           "${SMTP_PORT:-587}"
      SMTP_USER:           "${SMTP_USER:-}"
      SMTP_PASS:           "${SMTP_PASS:-}"
      SMTP_FROM:           "${SMTP_FROM:-}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s

  # ── Build worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - src_data:/app/src
      - galleries_dist:/app/dist
    environment:
      NODE_ENV:       "production"
      DB_HOST:        "db"
      DB_PORT:        "3306"
      DB_NAME:        "${DB_NAME:-gallerypack}"
      DB_USER:        "${DB_USER:-gallerypack}"
      DB_PASS:        "${DB_PASS:?DB_PASS is required}"
      BASE_URL:       "https://${DOMAIN}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-null}"
      SMTP_HOST:      "${SMTP_HOST:-}"
      SMTP_PORT:      "${SMTP_PORT:-587}"
      SMTP_USER:      "${SMTP_USER:-}"
      SMTP_PASS:      "${SMTP_PASS:-}"
      SMTP_FROM:      "${SMTP_FROM:-}"

  # ── Apache reverse proxy ─────────────────────────────────────────────────────
  apache:
    build:
      context: config/apache
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - galleries_dist:/srv/galleries:ro          # built galleries (static)
      - letsencrypt:/etc/letsencrypt:ro            # certs (read by Apache)
      - certbot_webroot:/var/www/certbot           # ACME challenge files
    environment:
      DOMAIN: "${DOMAIN:?DOMAIN is required}"

  # ── Certbot (certificate renewal) ───────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt              # certs (written by Certbot)
      - certbot_webroot:/var/www/certbot           # ACME challenge files
    # Renew twice a day; reload Apache after each successful renewal
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"

volumes:
  db_data:
  src_data:
  galleries_dist:
  app_data:
  letsencrypt:
  certbot_webroot:
