# GalleryPack — Production Docker Compose
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up -d
#
# Apache on the host serves dist/ directly and proxies dynamic routes
# to this container. The port is bound to 127.0.0.1 only (not public).
#
# Required env vars (copy deploy/.env.example → deploy/.env and edit):
#   ADMIN_PASSWORD    — admin panel password
#   SESSION_SECRET    — random string (openssl rand -hex 32)
#   BASE_URL          — public HTTPS URL, e.g. https://galleries.example.com

services:
  gallerypack:
    build:
      context: ..
      dockerfile: Dockerfile
    # Only accessible from localhost — Apache proxies to it
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Galleries source (uploaded photos, gallery.config.json)
      - ../src:/app/src
      # Built output — Apache's DocumentRoot points here on the host
      - ../dist:/app/dist
      # Persistent settings, jobs, invites, uploads
      - ../server/data:/app/server/data
      - ../server/uploads:/app/server/uploads
    env_file:
      - .env
    environment:
      NODE_ENV:  production
      PORT:      "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/galleries').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s
