name: gallerypack-saas

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"
      MYSQL_DATABASE:      "${DB_NAME:-gallerypack}"
      MYSQL_USER:          "${DB_USER:-gallerypack}"
      MYSQL_PASSWORD:      "${DB_PASS:?DB_PASS is required}"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src                 # source photos (engine reads/writes here)
      - ./dist:/app/dist               # built galleries (engine writes here)
      - ./data:/app/data               # persistent server data (license file, etc.)
    environment:
      PORT:                "4000"
      NODE_ENV:            "production"
      LICENSE_FILE:        "/app/data/gallerypack.license"
      PLATFORM_MODE:       "${PLATFORM_MODE:-single}"
      BASE_DOMAIN:         "${BASE_DOMAIN:-gallerypack.app}"
      DB_HOST:             "db"
      DB_PORT:             "3306"
      DB_NAME:             "${DB_NAME:-gallerypack}"
      DB_USER:             "${DB_USER:-gallerypack}"
      DB_PASS:             "${DB_PASS:?DB_PASS is required}"
      ADMIN_EMAIL:         "${ADMIN_EMAIL:-admin@localhost}"
      ADMIN_PASSWORD:      "${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"
      SESSION_SECRET:      "${SESSION_SECRET:?SESSION_SECRET is required}"
      VIEWER_TOKEN_SECRET: "${VIEWER_TOKEN_SECRET:-change-me-in-production}"
      BASE_URL:            "${BASE_URL:-http://localhost}"
      EMAIL_PROVIDER:      "${EMAIL_PROVIDER:-null}"
      SMTP_HOST:           "${SMTP_HOST:-}"
      SMTP_PORT:           "${SMTP_PORT:-587}"
      SMTP_USER:           "${SMTP_USER:-}"
      SMTP_PASS:           "${SMTP_PASS:-}"
      SMTP_FROM:           "${SMTP_FROM:-}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
    environment:
      NODE_ENV:       "production"
      DB_HOST:        "db"
      DB_PORT:        "3306"
      DB_NAME:        "${DB_NAME:-gallerypack}"
      DB_USER:        "${DB_USER:-gallerypack}"
      DB_PASS:        "${DB_PASS:?DB_PASS is required}"
      BASE_URL:       "${BASE_URL:-http://localhost}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-null}"
      SMTP_HOST:      "${SMTP_HOST:-}"
      SMTP_PORT:      "${SMTP_PORT:-587}"
      SMTP_USER:      "${SMTP_USER:-}"
      SMTP_PASS:      "${SMTP_PASS:-}"
      SMTP_FROM:      "${SMTP_FROM:-}"

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      BASE_DOMAIN: "${BASE_DOMAIN:-gallerypack.app}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dist:/srv/galleries:ro       # built galleries served as static files
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  db_data:
  caddy_data:
  caddy_config:
