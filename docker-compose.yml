services:
  gallerypack:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist source galleries and built output outside the container
      - ./src:/app/src
      - ./dist:/app/dist
      # Mount server code live — changes take effect on container restart (no rebuild needed)
      - ./server:/app/server
    environment:
      PORT:           "3000"
      BASE_URL:       "http://localhost:3000"
      ADMIN_PASSWORD: "changeme"
      SESSION_SECRET: "change-this-to-a-random-secret"
    restart: unless-stopped
