<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Gallery — GalleryPack</title>
  <script src="/js/i18n.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2; --surface: #ffffff; --border: #e4e2d8;
      --accent: #c4933f; --text: #1c1c1a; --muted: #888480;
      --danger: #c94040; --green: #2a9e52; --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; padding: 40px 16px 80px; }
    .wrap { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
    .logo { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); text-align: center; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 600; }
    .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 99px; }
    .status-badge.done     { background: rgba(42,158,82,.1);  color: var(--green); }
    .status-badge.error    { background: rgba(201,64,64,.1);  color: var(--danger); }
    .status-badge.building { background: rgba(196,147,63,.1); color: var(--accent); }
    .status-badge.queued   { background: rgba(136,132,128,.1); color: var(--muted); }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(196,147,63,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    input[type=text] { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; padding: 9px 12px; width: 100%; outline: none; transition: border-color .2s; }
    input[type=text]:focus { border-color: var(--accent); }
    .btn { display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: var(--radius); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; padding: 9px 16px; transition: opacity .15s; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { opacity: .88; }
    .btn-accent:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .gallery-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); text-decoration: none; font-weight: 500; font-size: 14px; }
    .gallery-link:hover { opacity: .8; }
    .photo-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
    .photo-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
    .photo-item-name { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .photo-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
    .photo-remove:hover { color: var(--danger); background: rgba(201,64,64,.08); }
    .dropzone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 28px 20px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
    .dropzone:hover, .dropzone.drag-over { border-color: var(--accent); background: rgba(196,147,63,.04); }
    .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dropzone-label { font-size: 14px; color: var(--muted); }
    .dropzone-label strong { color: var(--accent); }
    .error-banner { background: rgba(201,64,64,.08); border: 1px solid rgba(201,64,64,.3); border-radius: var(--radius); color: var(--danger); font-size: 13px; padding: 10px 14px; display: none; }
    .error-banner.show { display: block; }
    #rebuild-notice { background: rgba(196,147,63,.08); border: 1px solid rgba(196,147,63,.3); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--accent); display: none; }
    #rebuild-notice.show { display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">GalleryPack</div>

  <div id="error-screen" style="display:none">
    <div class="error-banner show" id="main-error"></div>
  </div>

  <div id="main-screen" style="display:none">

    <div>
      <h1 id="gallery-title-display">Loading&hellip;</h1>
      <div class="subtitle" id="gallery-sub"></div>
    </div>

    <!-- Status -->
    <div class="card">
      <div class="card-title" data-i18n="mygallery.section.status">Status</div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span id="status-badge" class="status-badge">&mdash;</span>
        <a id="gallery-link" href="#" target="_blank" rel="noopener" class="gallery-link" style="display:none" data-i18n="mygallery.gallery.open">Open gallery →</a>
      </div>
      <div id="rebuild-notice" style="margin-top:12px">
        <div class="spinner"></div>
        <span data-i18n="mygallery.rebuilding">Gallery is rebuilding…</span>
      </div>
    </div>

    <!-- Photos -->
    <div class="card">
      <div class="card-title" data-i18n="mygallery.section.photos">Photos</div>
      <div class="error-banner" id="photos-error"></div>
      <div class="photo-list" id="photo-list"></div>
      <div style="margin-top:14px">
        <div class="dropzone" id="dropzone">
          <input type="file" id="photos-input" multiple accept="image/*,image/heic,image/heif">
          <div class="dropzone-label" data-i18n-html="mygallery.dropzone.label"><strong>Add photos</strong> — click or drag &amp; drop</div>
        </div>
      </div>
    </div>

    <!-- Edit details -->
    <div class="card">
      <div class="card-title" data-i18n="mygallery.section.details">Gallery details</div>
      <div class="error-banner" id="edit-error"></div>
      <div class="field">
        <label for="edit-title" data-i18n="mygallery.field.title">Title</label>
        <input type="text" id="edit-title" placeholder="Gallery title">
      </div>
      <div class="field">
        <label for="edit-location"><span data-i18n="mygallery.field.location">Location</span> <span style="font-size:11px;color:var(--muted)" data-i18n="mygallery.field.location.hint">(overridden by EXIF if present)</span></label>
        <input type="text" id="edit-location" placeholder="Paris, France">
      </div>
      <button class="btn btn-accent" id="save-details-btn" style="margin-top:4px" data-i18n="mygallery.save">Save &amp; rebuild</button>
    </div>

  </div>

  <div id="loading-screen" style="text-align:center;padding:60px 0;color:var(--muted)">
    <div class="spinner" style="width:24px;height:24px;margin:0 auto 12px"></div>
    <p style="font-size:13px" data-i18n="mygallery.loading">Loading…</p>
  </div>
</div>

<script>
  const pathParts = location.pathname.split('/').filter(Boolean);
  const jobId = pathParts[pathParts.length - 1];
  const token = new URLSearchParams(location.search).get('token');

  window.GP_LOCALE = gpDetectLocale();
  applyI18n();

  if (!jobId || !token) {
    showError(t('mygallery.error.invalid'));
  } else {
    loadGallery();
  }

  let galleryData = null;
  let pollTimer   = null;

  async function loadGallery() {
    try {
      const res  = await fetch(`/api/my-gallery/${jobId}?token=${encodeURIComponent(token)}`);
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 404) showError(t('mygallery.error.notfound'));
        else showError(t('mygallery.error.invalid'));
        return;
      }
      if (data.config?.locale) {
        window.GP_LOCALE = gpDetectLocale(data.config.locale);
        applyI18n();
      }
      galleryData = data;
      render(data);
    } catch (err) {
      showError(t('mygallery.error.network'));
    }
  }

  function render({ job, photos, config }) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-screen').style.display   = '';

    document.getElementById('gallery-title-display').textContent = job.title || job.slug;
    document.getElementById('gallery-sub').textContent = job.photographerName || '';

    // Status
    const badge = document.getElementById('status-badge');
    const labels = { done: t('mygallery.status.ready'), error: t('mygallery.status.error'), building: t('status.building'), queued: t('status.queued') };
    badge.textContent = labels[job.status] || job.status;
    badge.className = `status-badge ${job.status}`;

    const link = document.getElementById('gallery-link');
    if (job.galleryUrl) {
      link.href = job.galleryUrl;
      link.style.display = '';
    }

    const notice = document.getElementById('rebuild-notice');
    if (job.status === 'building' || job.status === 'queued') {
      notice.classList.add('show');
      clearTimeout(pollTimer);
      pollTimer = setTimeout(loadGallery, 3000);
    } else {
      notice.classList.remove('show');
    }

    // Photos list
    const list = document.getElementById('photo-list');
    list.innerHTML = '';
    for (const name of photos) {
      const item = document.createElement('div');
      item.className = 'photo-item';
      item.innerHTML = `<span class="photo-item-name">${esc(name)}</span>
        <button class="photo-remove" data-name="${esc(name)}" title="Remove">&times;</button>`;
      list.appendChild(item);
    }
    if (!photos.length) {
      list.innerHTML = `<p style="font-size:13px;color:var(--muted);padding:4px 0">${t('mygallery.photos.empty')}</p>`;
    }
    list.querySelectorAll('[data-name]').forEach(btn =>
      btn.addEventListener('click', () => removePhoto(btn.dataset.name)));

    // Pre-fill edit form
    document.getElementById('edit-title').value    = job.title    || '';
    document.getElementById('edit-location').value = config?.location || '';
  }

  async function removePhoto(name) {
    const errEl = document.getElementById('photos-error');
    errEl.classList.remove('show');
    try {
      const res  = await fetch(`/api/my-gallery/${jobId}/photos/${encodeURIComponent(name)}?token=${encodeURIComponent(token)}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      loadGallery();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
    }
  }

  // Add photos
  const dropzone    = document.getElementById('dropzone');
  const photosInput = document.getElementById('photos-input');

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); uploadPhotos([...e.dataTransfer.files]); });
  photosInput.addEventListener('change', () => { uploadPhotos([...photosInput.files]); photosInput.value = ''; });

  async function uploadPhotos(files) {
    if (!files.length) return;
    const errEl = document.getElementById('photos-error');
    errEl.classList.remove('show');
    const fd = new FormData();
    for (const f of files) fd.append('photos', f);
    try {
      const res  = await fetch(`/api/my-gallery/${jobId}/photos?token=${encodeURIComponent(token)}`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      loadGallery();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
    }
  }

  // Edit details
  document.getElementById('save-details-btn').addEventListener('click', async () => {
    const errEl = document.getElementById('edit-error');
    const btn   = document.getElementById('save-details-btn');
    errEl.classList.remove('show');
    btn.disabled = true;
    try {
      const res = await fetch(`/api/my-gallery/${jobId}?token=${encodeURIComponent(token)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title:    document.getElementById('edit-title').value.trim(),
          location: document.getElementById('edit-location').value.trim(),
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      loadGallery();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
    }
  });

  function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display  = '';
    document.getElementById('main-error').textContent = msg;
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
