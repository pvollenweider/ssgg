name: gallerypack-saas

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./data:/app/data               # SQLite database
      - ./storage:/app/storage         # source photos + built galleries
    environment:
      PORT:                "4000"
      NODE_ENV:            "production"
      DATA_DIR:            "/app/data"
      STORAGE_DRIVER:      "local"
      STORAGE_ROOT:        "/app/storage"
      ADMIN_PASSWORD:      "${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"
      SESSION_SECRET:      "${SESSION_SECRET:?SESSION_SECRET is required}"
      VIEWER_TOKEN_SECRET: "${VIEWER_TOKEN_SECRET:-change-me-in-production}"
      BASE_URL:            "${BASE_URL:-http://localhost}"
      EMAIL_PROVIDER:      "${EMAIL_PROVIDER:-null}"
      SMTP_HOST:           "${SMTP_HOST:-}"
      SMTP_PORT:           "${SMTP_PORT:-587}"
      SMTP_USER:           "${SMTP_USER:-}"
      SMTP_PASS:           "${SMTP_PASS:-}"
      SMTP_FROM:           "${SMTP_FROM:-}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      NODE_ENV:       "production"
      DATA_DIR:       "/app/data"
      STORAGE_DRIVER: "local"
      STORAGE_ROOT:   "/app/storage"
      BASE_URL:       "${BASE_URL:-http://localhost}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-null}"
      SMTP_HOST:      "${SMTP_HOST:-}"
      SMTP_PORT:      "${SMTP_PORT:-587}"
      SMTP_USER:      "${SMTP_USER:-}"
      SMTP_PASS:      "${SMTP_PASS:-}"
      SMTP_FROM:      "${SMTP_FROM:-}"

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./storage/dist:/srv/galleries:ro   # serve built galleries as static files
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
