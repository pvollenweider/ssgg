name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/pvollenweider

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile.api
          - name: worker
            dockerfile: Dockerfile.worker
          - name: web
            dockerfile: Dockerfile.web
            # web image uses scratch final stage — skip standard healthcheck
            target: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/gallerypack-${{ matrix.name }}
          tags: |
            # push to main → :dev
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            # tag v*-alpha → :alpha + :vX.Y.Z-alpha
            type=raw,value=alpha,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-alpha') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-alpha') }}
            # tag v*-beta → :beta + :vX.Y.Z-beta
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-beta') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-beta') }}
            # tag v* (release, no prerelease suffix) → :prod + :vX.Y.Z + :latest
            type=raw,value=prod,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-alpha') && !contains(github.ref, '-beta') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-alpha') && !contains(github.ref, '-beta') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-alpha') && !contains(github.ref, '-beta') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push — ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
