# GalleryPack — Apache VirtualHost configuration
#
# Architecture:
#   Apache serves dist/ statically (HTTP/2, brotli, long-lived cache)
#   Apache proxies admin/upload/api routes to the Docker Node.js container (:3000)
#   .htaccess Basic Auth handles password-protected galleries natively
#
# Required modules:
#   a2enmod proxy proxy_http rewrite headers ssl expires brotli http2
#   a2ensite photos.vollenweider.org
#   systemctl reload apache2
#
# Placeholders to replace:
#   photos.vollenweider.org              → your domain
#   /var/www/vhosts/photos.vollenweider.org/html  → path to GalleryPack's dist/
#   /path/to/gallerypack                 → GalleryPack project root (for deploy/.env)

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerAdmin webmaster@vollenweider.org
    ServerName  photos.vollenweider.org
    DocumentRoot /var/www/vhosts/photos.vollenweider.org/html
    CustomLog /var/log/apache2/photos.vollenweider.org-access_log combined

    RewriteEngine On

    # Block TRACE/TRACK methods
    RewriteCond %{REQUEST_METHOD} ^(TRACE|TRACK)
    RewriteRule .* - [F]

    # Legacy URL redirects
    RewriteRule ^/chaton20050913(.*)$ /chaton$1 [R,L]

    Redirect /usage http://pol2.vollenweider.org/cgi-bin/awstats.pl?config=photos.vollenweider.org

    <Directory /var/www/vhosts/photos.vollenweider.org/html>
        Options FollowSymLinks MultiViews
        AllowOverride None
        Order allow,deny
        allow from all
    </Directory>

    # Redirect all HTTP to HTTPS
    RewriteCond %{SERVER_NAME} =photos.vollenweider.org
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# ── HTTPS ────────────────────────────────────────────────────────────────────
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin webmaster@vollenweider.org
    ServerName  photos.vollenweider.org
    DocumentRoot /var/www/vhosts/photos.vollenweider.org/html
    CustomLog /var/log/apache2/photos.vollenweider.org-access_log combined

    RewriteEngine On

    # Block TRACE/TRACK methods
    RewriteCond %{REQUEST_METHOD} ^(TRACE|TRACK)
    RewriteRule .* - [F]

    # Legacy URL redirects
    RewriteRule ^/chaton20050913(.*)$ /chaton$1 [R,L]

    Redirect /usage http://pol2.vollenweider.org/cgi-bin/awstats.pl?config=photos.vollenweider.org

    # ── HTTP/2 ──────────────────────────────────────────────────────────────
    Protocols h2 http/1.1
    H2Direct on

    # Keep-Alive (HTTP/1.1 fallback — HTTP/2 multiplexes natively)
    KeepAlive On
    KeepAliveTimeout 5
    MaxKeepAliveRequests 100

    # ── Security headers ────────────────────────────────────────────────────
    Header set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Cross-Origin-Opener-Policy "same-origin"

    # CSP — 'unsafe-inline' required for GalleryPack's inlined scripts/styles
    # connect-src 'self' covers the SSE stream (/api/galleries/:id/stream)
    Header always set Content-Security-Policy "\
default-src 'self'; \
script-src 'self' 'unsafe-inline'; \
style-src 'self' 'unsafe-inline'; \
img-src 'self' data:; \
font-src 'self'; \
connect-src 'self'; \
frame-ancestors 'none'; \
base-uri 'self'; \
form-action 'self'"

    AddType image/webp    .webp
    AddType font/woff2    .woff2
    AddType image/svg+xml .svg

    # ── Static files (dist/) ────────────────────────────────────────────────
    # AllowOverride AuthConfig enables per-gallery .htaccess Basic Auth
    <Directory /var/www/vhosts/photos.vollenweider.org/html>
        Options FollowSymLinks MultiViews
        AllowOverride AuthConfig
        Order allow,deny
        allow from all
    </Directory>

    # ── Cache-Control ────────────────────────────────────────────────────────
    <IfModule mod_headers.c>
        # Gallery assets: versioned filenames (e.g. polito_grisons_001.webp) → immutable
        <FilesMatch "\.(css|js|woff2|svg|png|jpg|jpeg|webp|ico)$">
            Header always set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>

        # HTML pages: revalidate after 5 minutes (cover photo, gallery list may change)
        <FilesMatch "\.html$">
            Header always set Cache-Control "public, max-age=300, must-revalidate"
        </FilesMatch>
    </IfModule>

    # ── Expires (HTTP/1.0 proxies + reinforces Cache-Control) ───────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault                          "access plus 1 month"
        ExpiresByType text/html                 "access plus 5 minutes"
        ExpiresByType text/css                  "access plus 1 year"
        ExpiresByType application/javascript    "access plus 1 year"
        ExpiresByType font/woff2                "access plus 1 year"
        ExpiresByType image/svg+xml             "access plus 1 year"
        ExpiresByType image/webp                "access plus 1 year"
        ExpiresByType image/png                 "access plus 1 year"
        ExpiresByType image/jpeg                "access plus 1 year"
        ExpiresByType image/x-icon              "access plus 1 year"
    </IfModule>

    # ── Compression (Brotli preferred, Deflate fallback) ────────────────────
    <IfModule mod_brotli.c>
        AddOutputFilterByType BROTLI_COMPRESS \
            text/html text/plain text/css \
            text/javascript application/javascript \
            application/json image/svg+xml
    </IfModule>

    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE \
            text/html text/plain text/css \
            text/javascript application/javascript \
            application/json image/svg+xml
        DeflateCompressionLevel 6
    </IfModule>

    # ── GalleryPack — proxy dynamic routes → Docker Node.js (:3000) ─────────
    #
    # ProxyPass rules must be declared BEFORE DocumentRoot catches the request.
    # The port is bound to 127.0.0.1 only in docker-compose.prod.yml (not public).
    #
    # Required: a2enmod proxy proxy_http
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # SSE build-log stream — disable buffering so events arrive in real time.
    # flushpackets=on tells mod_proxy_http to flush each chunk immediately.
    # Note: HTTP/2 multiplexing handles SSE natively; no special config needed
    # for h2 clients, only for HTTP/1.1 fallback.
    ProxyPass        /api/galleries  http://127.0.0.1:3000/api/galleries  flushpackets=on
    ProxyPassReverse /api/galleries  http://127.0.0.1:3000/api/galleries

    # REST API (settings, invites, photos, auth…)
    ProxyPass        /api/           http://127.0.0.1:3000/api/
    ProxyPassReverse /api/           http://127.0.0.1:3000/api/

    # Admin SPA
    ProxyPass        /admin          http://127.0.0.1:3000/admin
    ProxyPassReverse /admin          http://127.0.0.1:3000/admin

    # Shared JS (i18n.js and other server/public/js assets)
    ProxyPass        /js/            http://127.0.0.1:3000/js/
    ProxyPassReverse /js/            http://127.0.0.1:3000/js/

    # Photographer upload form (invite link)
    ProxyPass        /upload/        http://127.0.0.1:3000/upload/
    ProxyPassReverse /upload/        http://127.0.0.1:3000/upload/

    # Photographer gallery management page
    ProxyPass        /my-gallery/    http://127.0.0.1:3000/my-gallery/
    ProxyPassReverse /my-gallery/    http://127.0.0.1:3000/my-gallery/

    # Build status page
    ProxyPass        /status/        http://127.0.0.1:3000/status/
    ProxyPassReverse /status/        http://127.0.0.1:3000/status/

    # ── SSL (managed by certbot) ─────────────────────────────────────────────
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile    /etc/letsencrypt/live/photos.vollenweider.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/photos.vollenweider.org/privkey.pem
</VirtualHost>
</IfModule>
