name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gallerypack-api:latest
            ghcr.io/${{ github.repository_owner }}/gallerypack-api:${{ github.sha }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gallerypack-worker:latest
            ghcr.io/${{ github.repository_owner }}/gallerypack-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: pol
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl rollout restart deployment/api -n gallerypack
            kubectl rollout restart deployment/worker -n gallerypack
            kubectl rollout status deployment/api -n gallerypack --timeout=120s
            kubectl rollout status deployment/worker -n gallerypack --timeout=120s
