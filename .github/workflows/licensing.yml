name: License headers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-headers:
    name: Verify license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check license headers
        run: node scripts/check-headers.js
